<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Sign — Hero</title>
<link rel="stylesheet" href="../styles.css">
<style>
  body {
    display: grid;
    grid-template-columns: 520px 1fr;
    gap: 70px;
    align-items: center;
  }
  .text-col { padding-right: 20px; }
  .shot-col {
    position: relative;
  }
  .shot-col .product-shot {
    height: 380px;
    width: 100%;
  }
  .shot-col .product-shot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: left center;
  }
  .badge-abs {
    position: absolute;
    top: -18px;
    right: 20px;
    z-index: 5;
  }
  .chips {
    display: flex;
    gap: 12px;
    margin-top: 38px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .chip .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 12px var(--red);
  }
</style>
</head>
<body>
  <div class="text-col">
    <div class="brand">
      <img src="../assets/icon.png" alt="PDF Sign">
      <span class="brand-name">PDF Sign</span>
    </div>

    <h1 class="headline">Sign&nbsp;PDFs<br>in <span class="accent">3&nbsp;clicks</span></h1>
    <p class="subcopy">Draw signature → Place on page → Download.<br>No uploads. Ever.</p>

    <div class="chips">
      <span class="chip"><span class="dot"></span>Private</span>
      <span class="chip"><span class="dot"></span>Instant</span>
      <span class="chip"><span class="dot"></span>$2.99/mo</span>
    </div>
  </div>

  <div class="shot-col">
    <div class="badge-abs">
      <span class="badge">1st file free · $2.99/mo</span>
    </div>
    <div class="product-shot">
      <img src="../assets/product-form-filled-edited.png" alt="PDF Sign editor with filled signed form">
    </div>
  </div>
</body>
</html>
