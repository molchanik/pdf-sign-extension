<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Sign — Privacy</title>
<link rel="stylesheet" href="../styles.css">
<style>
  body {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 60px;
    align-items: center;
    padding: 70px 80px;
  }

  .text-col {
    display: flex;
    flex-direction: column;
    gap: 30px;
  }

  .eyebrow { margin-bottom: 0; }
  .headline {
    font-size: 60px;
    line-height: 1.02;
  }
  .subcopy {
    font-size: 22px;
    margin-top: 6px;
    max-width: 540px;
  }

  .proofs {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 4px;
  }

  .proof {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
  }

  .proof .check {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(34, 197, 94, 0.2);
    border: 1px solid rgba(34, 197, 94, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #22c55e;
    font-weight: 900;
    font-size: 15px;
  }

  .proof strong {
    color: var(--text);
    font-weight: 700;
  }

  .shot-col {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .product-shot {
    width: 320px;
    height: 640px;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    background: #fff;
  }

  .product-shot img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    object-position: center bottom;
  }

  .arrow-callout {
    position: absolute;
    background: var(--red);
    color: #fff;
    padding: 12px 18px;
    border-radius: 100px;
    font-size: 16px;
    font-weight: 700;
    white-space: nowrap;
    box-shadow: 0 10px 28px var(--red-glow);
    z-index: 4;
  }

  .arrow-callout.locally {
    bottom: 80px;
    left: -200px;
  }
  .arrow-callout.locally::after {
    content: '→';
    position: absolute;
    right: -38px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--red);
    font-size: 28px;
    font-weight: 900;
    text-shadow: 0 0 10px var(--red);
  }

  .arrow-callout.free {
    bottom: 20px;
    left: -160px;
  }
  .arrow-callout.free::after {
    content: '→';
    position: absolute;
    right: -38px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--red);
    font-size: 28px;
    font-weight: 900;
    text-shadow: 0 0 10px var(--red);
  }
</style>
</head>
<body>
  <div class="text-col">
    <div class="eyebrow">Privacy</div>
    <h1 class="headline">Your files stay<br>in <span class="accent">your browser.</span></h1>
    <p class="subcopy">Every PDF is processed locally — nothing is uploaded to any server.</p>

    <div class="proofs">
      <div class="proof">
        <span class="check">✓</span>
        <span><strong>Zero uploads</strong> — PDF never leaves your device</span>
      </div>
      <div class="proof">
        <span class="check">✓</span>
        <span><strong>Zero tracking</strong> — no analytics, no telemetry</span>
      </div>
      <div class="proof">
        <span class="check">✓</span>
        <span><strong>Zero accounts</strong> for editing — just sign in at download</span>
      </div>
    </div>
  </div>

  <div class="shot-col">
    <div class="product-shot">
      <img src="../assets/product-signature-thick.png" alt="PDF Sign sidebar with drawn signature and 'Processing locally · no upload' indicator">
    </div>
  </div>
</body>
</html>
