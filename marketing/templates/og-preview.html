<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Sign — OG preview (1200×630)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=JetBrains+Mono:wght@500&display=swap">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --text: #ffffff;
    --text-muted: #a1a1aa;
    --red: #E3342F;
    --red-glow: rgba(227, 52, 47, 0.28);
  }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    color: var(--text);
    font-family: 'Inter', -apple-system, 'Segoe UI', system-ui, sans-serif;
    font-feature-settings: 'cv11', 'ss01';
    -webkit-font-smoothing: antialiased;
  }
  body {
    background:
      radial-gradient(ellipse 900px 600px at 85% 15%, rgba(227, 52, 47, 0.18), transparent 60%),
      radial-gradient(ellipse 700px 500px at 10% 90%, rgba(227, 52, 47, 0.07), transparent 70%),
      var(--bg);
    padding: 80px 88px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand img {
    width: 44px;
    height: 44px;
    border-radius: 10px;
  }
  .brand-name {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .headline {
    font-size: 74px;
    font-weight: 800;
    letter-spacing: -2.5px;
    line-height: 1.02;
  }
  .headline .accent { color: var(--red); }
  .bottom {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 12px;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.2px;
  }
  .chip .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 12px var(--red);
  }
  .chip.primary {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
    box-shadow: 0 12px 32px var(--red-glow);
  }
  /* Decorative signature stroke, bottom-right corner */
  .flourish {
    position: absolute;
    right: 88px;
    top: 80px;
    width: 220px;
    height: 96px;
    opacity: 0.55;
  }
  .flourish path {
    fill: none;
    stroke: var(--red);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>
  <div class="brand">
    <img src="../assets/icon.png" alt="">
    <span class="brand-name">PDF Sign</span>
  </div>

  <!-- Decorative signature curl — evokes "sign" without being a real signature -->
  <svg class="flourish" viewBox="0 0 220 96" aria-hidden="true">
    <path d="M 8 64 C 30 32, 60 18, 90 38 S 140 78, 168 40 C 180 24, 196 20, 212 30" />
    <path d="M 120 70 L 210 70" opacity="0.4" />
  </svg>

  <h1 class="headline">
    Sign PDFs in your browser.<br>
    <span class="accent">Nothing uploads.</span>
  </h1>

  <div class="bottom">
    <span class="chip primary">Chrome extension</span>
    <span class="chip"><span class="dot"></span>1 file free</span>
    <span class="chip"><span class="dot"></span>$2.99/mo unlimited</span>
    <span class="chip"><span class="dot"></span>No uploads</span>
  </div>
</body>
</html>
