<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Sign — OG preview (1200×630)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --text: #ffffff;
    --text-muted: #a1a1aa;
    --red: #E3342F;
    --red-glow: rgba(227, 52, 47, 0.28);
  }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    color: var(--text);
    font-family: 'Inter', -apple-system, 'Segoe UI', system-ui, sans-serif;
    font-feature-settings: 'cv11', 'ss01';
    -webkit-font-smoothing: antialiased;
  }
  body {
    background:
      radial-gradient(ellipse 900px 600px at 85% 50%, rgba(227, 52, 47, 0.20), transparent 62%),
      radial-gradient(ellipse 700px 500px at 8% 85%, rgba(227, 52, 47, 0.08), transparent 70%),
      var(--bg);
    position: relative;
    display: grid;
    /* brand row + flexible content row. Bottom padding keeps chips
       well above any 2:1 crop line a social card might apply. */
    grid-template-rows: auto 1fr;
    padding: 56px 88px 56px;
  }

  /* Brand: top-left, fixed height row */
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand img {
    width: 44px;
    height: 44px;
    border-radius: 10px;
  }
  .brand-name {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  /* Main content: vertically centered in the flexible row */
  .main {
    align-self: center;
    display: flex;
    flex-direction: column;
    gap: 32px;
    /* Leave a little room for the decorative flourish on the right */
    max-width: 1024px;
  }

  .headline {
    font-size: 76px;
    font-weight: 800;
    letter-spacing: -2.5px;
    line-height: 1.02;
  }
  .headline .accent { color: var(--red); }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 11px 18px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 12px;
    font-size: 19px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.2px;
  }
  .chip .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 12px var(--red);
  }
  .chip.primary {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
    box-shadow: 0 10px 28px var(--red-glow);
  }

  /* Decorative signature curl — vertically aligned with the content,
     in the right ~25% of the canvas. Subtle, won't compete with text. */
  .flourish {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 360px;
    height: 260px;
    opacity: 0.22;
    pointer-events: none;
  }
  .flourish path {
    fill: none;
    stroke: var(--red);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>
  <div class="brand">
    <img src="../assets/icon.png" alt="">
    <span class="brand-name">PDF Sign</span>
  </div>

  <svg class="flourish" viewBox="0 0 360 260" aria-hidden="true">
    <path d="M 30 150 C 60 90, 110 60, 150 110 S 220 200, 260 140 C 280 100, 310 90, 340 110" />
    <path d="M 60 190 L 320 190" opacity="0.55" />
    <path d="M 280 80 L 330 60" opacity="0.4" />
  </svg>

  <main class="main">
    <h1 class="headline">
      Sign PDFs in your browser.<br>
      <span class="accent">Nothing uploads.</span>
    </h1>

    <div class="chips">
      <span class="chip primary">Chrome extension</span>
      <span class="chip"><span class="dot"></span>1 file free</span>
      <span class="chip"><span class="dot"></span>$2.99/mo unlimited</span>
      <span class="chip"><span class="dot"></span>No uploads</span>
    </div>
  </main>
</body>
</html>
