<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Sign — OG preview 1200x630</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --text: #ffffff;
    --red: #E3342F;
    --red-bright: #F55A56;
  }

  /* We render in a larger Chrome window but the OG card is exactly
     1200×630. Using a wrapper with fixed dimensions keeps the
     composition crisp and lets us crop via PIL after the screenshot. */
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    font-feature-settings: 'cv11', 'ss01';
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 1200px;
    height: 630px;
    position: relative;
    overflow: hidden;
    color: var(--text);
    background:
      linear-gradient(100deg,
        rgba(8, 8, 8, 0.97) 0%,
        rgba(10, 10, 10, 0.94) 34%,
        rgba(10, 10, 10, 0.64) 58%,
        rgba(10, 10, 10, 0.26) 82%,
        rgba(10, 10, 10, 0.08) 100%),
      url('../assets/hero-quill.webp') right center / cover no-repeat,
      var(--bg);
  }

  /* Red brand-mood vignette */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 1100px 700px at 85% 40%, rgba(227, 52, 47, 0.20), transparent 60%),
      radial-gradient(ellipse 600px 400px at 10% 15%, rgba(227, 52, 47, 0.09), transparent 65%);
    mix-blend-mode: screen;
    pointer-events: none;
    z-index: 0;
  }

  .brand {
    position: absolute;
    top: 44px;
    left: 64px;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .brand img {
    width: 56px;
    height: 56px;
    border-radius: 13px;
    box-shadow: 0 8px 22px rgba(0, 0, 0, 0.4);
  }
  .brand-name {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.4px;
  }

  .headline {
    position: absolute;
    left: 64px;
    top: 206px;
    width: 820px;
    z-index: 2;
    font-size: 78px;
    font-weight: 800;
    letter-spacing: -2.6px;
    line-height: 1.0;
    text-shadow: 0 4px 28px rgba(0, 0, 0, 0.6);
  }
  .headline .accent { color: var(--red-bright); }

  .chips {
    position: absolute;
    left: 64px;
    bottom: 44px;
    width: 1070px;
    z-index: 2;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: rgba(10, 10, 10, 0.78);
    border: 1px solid rgba(255, 255, 255, 0.22);
    border-radius: 12px;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.2px;
    white-space: nowrap;
  }
  .chip .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 10px var(--red);
  }
  .chip.primary {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="../assets/icon.png" alt="">
      <span class="brand-name">PDF Sign</span>
    </div>

    <h1 class="headline">
      Sign PDFs in your browser.<br>
      <span class="accent">Nothing uploads.</span>
    </h1>

    <div class="chips">
      <span class="chip primary">Chrome extension</span>
      <span class="chip"><span class="dot"></span>1 file free</span>
      <span class="chip"><span class="dot"></span>$2.99/mo unlimited</span>
      <span class="chip"><span class="dot"></span>No uploads</span>
    </div>
  </div>
</body>
</html>
